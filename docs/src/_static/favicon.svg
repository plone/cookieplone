<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="cookieBody" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2BBAE4"/>
      <stop offset="100%" stop-color="#005A8E"/>
    </radialGradient>
    <radialGradient id="chip" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#004070"/>
      <stop offset="100%" stop-color="#001E3C"/>
    </radialGradient>
  </defs>

  <!-- Cookie body — slightly irregular circle for an organic baked feel -->
  <path d="
    M32 3
    C37 2, 44 4, 50 8
    C56 12, 61 19, 62 26
    C63 33, 61 41, 57 47
    C53 53, 46 58, 39 61
    C32 64, 24 63, 17 59
    C10 55, 5 48, 3 41
    C1 34, 2 26, 6 19
    C10 12, 17 6, 24 4
    C27 3, 30 4, 32 3 Z"
    fill="url(#cookieBody)"/>

  <!-- Rim — subtle darker stroke -->
  <path d="
    M32 3
    C37 2, 44 4, 50 8
    C56 12, 61 19, 62 26
    C63 33, 61 41, 57 47
    C53 53, 46 58, 39 61
    C32 64, 24 63, 17 59
    C10 55, 5 48, 3 41
    C1 34, 2 26, 6 19
    C10 12, 17 6, 24 4
    C27 3, 30 4, 32 3 Z"
    fill="none" stroke="#004D7A" stroke-width="1.5"/>

  <!-- Chips — 6 dark-navy drops scattered naturally -->
  <ellipse cx="22" cy="22" rx="4.5" ry="3.5" transform="rotate(-20 22 22)" fill="url(#chip)"/>
  <ellipse cx="38" cy="19" rx="4"   ry="3"   transform="rotate(10 38 19)"  fill="url(#chip)"/>
  <ellipse cx="16" cy="37" rx="3.5" ry="3"   transform="rotate(-15 16 37)" fill="url(#chip)"/>
  <ellipse cx="33" cy="33" rx="4"   ry="3"   transform="rotate(5 33 33)"   fill="url(#chip)"/>
  <ellipse cx="47" cy="35" rx="4"   ry="3"   transform="rotate(20 47 35)"  fill="url(#chip)"/>
  <ellipse cx="27" cy="48" rx="4"   ry="3"   transform="rotate(-10 27 48)" fill="url(#chip)"/>

  <!-- Soft specular highlight top-left -->
  <ellipse cx="23" cy="15" rx="9" ry="5" transform="rotate(-30 23 15)" fill="white" opacity="0.13"/>
</svg>
